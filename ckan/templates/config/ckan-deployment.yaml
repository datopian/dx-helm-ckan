apiVersion: v1
kind: ConfigMap
metadata:
  name: ckan-deployment
data:
  get_details.py: |
    #!/usr/bin/env python
    import sys
    from urllib.parse import urlparse

    def get_details_from_sql_string(sql_string):
        try:
            # Clean and parse the URI structure
            parsed = urlparse(str(sql_string).strip())

            # Extract database name cleanly (stripping leading slashes)
            database = parsed.path.lstrip('/')

            # Extract credentials safely
            username = parsed.username or ''
            password = parsed.password or ''

            # Ensure we don't return partial data if things are missing
            if not database or not username or not password:
                raise ValueError("Missing database, username, or password component in connection string.")

            # Print space-separated results as expected by your bash array read
            print(f"{database} {username} {password}")

        except Exception as e:
            # Direct errors to standard error stream so bash knows something went wrong
            sys.stderr.write(f"Parsing Error: {str(e)}\n")
            sys.exit(1)

    if __name__ == "__main__":
        if len(sys.argv) > 1:
            get_details_from_sql_string(sys.argv[1])
        else:
            sys.stderr.write("Error: No SQL connection string provided.\n")
            sys.exit(1)

  initContainer.sh: |
    #!/usr/bin/env bash

    # Exit immediately if a pipeline fails
    set -o pipefail

    # Helper functions for clean logging and strict failure
    log() { echo "[INFO] $1"; }
    fail() { echo "[ERROR] $1" >&2; exit 1; }

    # Create the Base for the Database and the Role Needed
    create_db_base() {
        local POSTGRES_HOST="${1}"
        local POSTGRES_SUPERUSER="${2}"
        local USER="${3}"
        local PASSWORD="${4}"
        local DATABASE="${5}"

        log "Verifying parameters for DB Base: ${DATABASE}"
        ( [ -z "${POSTGRES_HOST}" ] || [ -z "${POSTGRES_SUPERUSER}" ] || [ -z "${USER}" ] || [ -z "${PASSWORD}" ] ) && fail "Missing required parameters for DB base creation!"

        log "Initializing role '${USER}' on ${POSTGRES_HOST}"

        # Safely Check if Role Exists
        ROLE_EXISTS=$(psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -tAc "SELECT 1 FROM pg_catalog.pg_roles where rolname ='${USER}';") || fail "Could not query Postgres to check if role '${USER}' exists."
        
        if [ "$ROLE_EXISTS" = '1' ]; then
            log "Role '${USER}' already exists."
        else
            psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -c "
                CREATE ROLE \"${USER}\" WITH LOGIN PASSWORD '${PASSWORD}' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            " || fail "Failed to create role '${USER}'."
        fi

        # Safely Check if Database Exists
        DB_EXISTS=$(psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${DATABASE}';") || fail "Could not query Postgres to check if database '${DATABASE}' exists."

        if [ "$DB_EXISTS" = '1' ]; then
            log "Database '${DATABASE}' already exists."
        else
            psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -c "
                CREATE DATABASE \"${DATABASE}\";
            " || fail "Failed to create database '${DATABASE}'."
        fi

        log "Enforcing ownership of '${DATABASE}' to '${USER}'..."
        psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -c "
            ALTER DATABASE \"${DATABASE}\" OWNER TO \"${USER}\";
        " || fail "Failed to set database ownership for '${DATABASE}'."
    }

    create_ckan_db() {
        log "Starting CKAN Database Creation Process..."
        local POSTGRES_HOST="${1}"
        local POSTGRES_SUPERUSER="${2}"
        local USER="${3}"
        local PASSWORD="${4}"
        local DATABASE="${5}"

        create_db_base "${POSTGRES_HOST}" "${POSTGRES_SUPERUSER}" "${USER}" "${PASSWORD}" "${DATABASE}"

        log "Attempting to initialize PostGIS extensions in '${DATABASE}'..."
        if psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d "${DATABASE}" -c "
            CREATE EXTENSION IF NOT EXISTS postgis;
            CREATE EXTENSION IF NOT EXISTS postgis_topology;
            CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;
            CREATE EXTENSION IF NOT EXISTS postgis_tiger_geocoder;
        "; then
            log "PostGIS extensions initialized successfully."
        else
            log "WARNING: Failed to initialize PostGIS extensions. (Expected if not allow-listed in Azure). Bypassing and continuing..."
        fi
    }

    datastore() {
        local POSTGRES_HOST="${1}"
        local POSTGRES_SUPERUSER="${2}"
        local DS_DATABASE="${3}"
        local DS_RW_USER="${4}"
        local DS_RO_USER="${5}"
        local CKAN_USER="${6}"
        
        log "Configuring Datastore Views and Triggers in '${DS_DATABASE}'..."
        psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d "${DS_DATABASE}" -c "
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"${DS_RO_USER}\";
        ALTER DEFAULT PRIVILEGES FOR USER \"${DS_RW_USER}\" IN SCHEMA public GRANT SELECT ON TABLES TO \"${DS_RO_USER}\";

        CREATE OR REPLACE VIEW \"_table_metadata\" AS
            SELECT DISTINCT
                substr(md5(dependee.relname || COALESCE(dependent.relname, '')), 0, 17) AS \"_id\",
                dependee.relname AS name,
                dependee.oid AS oid,
                dependent.relname AS alias_of
            FROM
                pg_class AS dependee
                LEFT OUTER JOIN pg_rewrite AS r ON r.ev_class = dependee.oid
                LEFT OUTER JOIN pg_depend AS d ON d.objid = r.oid
                LEFT OUTER JOIN pg_class AS dependent ON d.refobjid = dependent.oid
            WHERE
                (dependee.oid != dependent.oid OR dependent.oid IS NULL) AND
                (dependee.relkind = 'r'::\"char\" OR dependee.relkind = 'v'::\"char\")
                AND dependee.relnamespace = (
                    SELECT oid FROM pg_namespace WHERE nspname='public')
            ORDER BY dependee.oid DESC;

        -- FIX 1: Change ownership from CKAN_USER to DS_RW_USER
        ALTER VIEW \"_table_metadata\" OWNER TO \"${DS_RW_USER}\";
        GRANT SELECT ON \"_table_metadata\" TO \"${DS_RO_USER}\";

        CREATE OR REPLACE FUNCTION populate_full_text_trigger() RETURNS trigger
        AS \$body\$
            BEGIN
                IF NEW._full_text IS NOT NULL THEN
                    RETURN NEW;
                END IF;
                NEW._full_text := (
                    SELECT to_tsvector(string_agg(value, ' '))
                    FROM json_each_text(row_to_json(NEW.*))
                    WHERE key NOT LIKE '\_%');
                RETURN NEW;
            END;
        \$body\$ LANGUAGE plpgsql;

        -- FIX 2: Change ownership from CKAN_USER to DS_RW_USER
        ALTER FUNCTION populate_full_text_trigger() OWNER TO \"${DS_RW_USER}\";

        DO \$body\$
            BEGIN
                EXECUTE coalesce(
                    (SELECT string_agg(
                        'CREATE TRIGGER zfulltext BEFORE INSERT OR UPDATE ON ' ||
                        quote_ident(relname) || ' FOR EACH ROW EXECUTE PROCEDURE ' ||
                        'populate_full_text_trigger();', ' ')
                    FROM pg_class
                    LEFT OUTER JOIN pg_trigger AS t
                        ON t.tgrelid = relname::regclass AND t.tgname = 'zfulltext'
                    WHERE relkind = 'r'::\"char\" AND t.tgname IS NULL
                        AND relnamespace = (
                            SELECT oid FROM pg_namespace WHERE nspname='public')),
                    'SELECT 1;');
            END;
        \$body\$;

        " || fail "Failed to execute datastore trigger/view configurations."
    }

    create_datastore_db() {
        log "Starting Datastore Database Creation Process..."
        local POSTGRES_HOST="${1}"
        local POSTGRES_SUPERUSER="${2}"
        local CKAN_USER="${3}"
        local DS_RW_USER="${4}"
        local DS_RW_PASSWORD="${5}"
        local DS_RO_USER="${6}"
        local DS_RO_PASSWORD="${7}"
        local DS_DATABASE="${8}"

        create_db_base "${POSTGRES_HOST}" "${POSTGRES_SUPERUSER}" "${DS_RW_USER}" "${DS_RW_PASSWORD}" "${DS_DATABASE}"

        ( [ -z "${CKAN_USER}" ] || [ -z "${DS_RO_USER}" ] || [ -z "${DS_RO_PASSWORD}" ] ) && fail "Missing datastore read-only parameters!"

        # Check and Create Read-Only Role
        DS_RO_EXISTS=$(psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -tAc "SELECT 1 FROM pg_catalog.pg_roles where rolname ='${DS_RO_USER}';") || fail "Could not check for DS_RO_USER role."
        if [ "$DS_RO_EXISTS" = '1' ]; then
            log "Role '${DS_RO_USER}' already exists."
        else
            psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d postgres -c "
                CREATE ROLE \"${DS_RO_USER}\" WITH LOGIN PASSWORD '${DS_RO_PASSWORD}' NOSUPERUSER NOCREATEDB NOCREATEROLE;
            " || fail "Failed to create Datastore Read-Only Role."
        fi

        log "Granting Ownership and Permissions..."
        psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d "${DS_DATABASE}" -c "
            GRANT \"${CKAN_USER}\" to \"${POSTGRES_SUPERUSER}\";
            GRANT \"${DS_RW_USER}\" to \"${POSTGRES_SUPERUSER}\";
            GRANT \"${DS_RO_USER}\" to \"${POSTGRES_SUPERUSER}\";
        " || fail "Failed to grant role memberships."
        psql -v ON_ERROR_STOP=on -h "${POSTGRES_HOST}" -U "${POSTGRES_SUPERUSER}" -d "${DS_DATABASE}" -c "
            -- revoke permissions for the read-only user
            REVOKE CREATE ON SCHEMA public FROM PUBLIC;
            REVOKE USAGE ON SCHEMA public FROM PUBLIC;

            GRANT CREATE ON SCHEMA public TO \"${CKAN_USER}\";
            GRANT USAGE ON SCHEMA public TO \"${CKAN_USER}\";

            GRANT CREATE ON SCHEMA public TO \"${DS_RW_USER}\";
            GRANT USAGE ON SCHEMA public TO \"${DS_RW_USER}\";

            -- take connect permissions from main db
            REVOKE CONNECT ON DATABASE \"${CKAN_USER}\" FROM \"${DS_RO_USER}\";

            -- grant select permissions for read-only user
            GRANT CONNECT ON DATABASE \"${DS_RW_USER}\" TO \"${DS_RO_USER}\";
            GRANT USAGE ON SCHEMA public TO \"${DS_RO_USER}\";

            -- grant access to current tables and views to read-only user
            GRANT SELECT ON ALL TABLES IN SCHEMA public TO \"${DS_RO_USER}\";

            -- grant access to new tables and views by default
            ALTER DEFAULT PRIVILEGES FOR USER \"${DS_RW_USER}\" IN SCHEMA public
            GRANT SELECT ON TABLES TO \"${DS_RO_USER}\";
        " || fail "Failed to configure schema permissions."

        # DELETED THE REDUNDANT PGPASSWORD BLOCK HERE

        datastore "${POSTGRES_HOST}" "${POSTGRES_SUPERUSER}" "$DS_DATABASE" "$DS_RW_USER" "$DS_RO_USER" "${CKAN_USER}"
    }
        
    init(){
        # Require SSL for Azure, but allow overrides for GKE/Local
        export PGSSLMODE="${CKAN_DB_SSLMODE:-require}"

        POSTGRES_USER="${CKAN_CLOUD_POSTGRES_USER}"
        POSTGRES_HOST="${CKAN_CLOUD_POSTGRES_HOST}"
        
        CKAN_URL="${CKAN_SQLALCHEMY_URL}"
        DATASTORE_WRITE_URL="${CKAN__DATASTORE__WRITE_URL}"
        DATASTORE_READ_URL="${CKAN__DATASTORE__READ_URL}"
        
        # --- 1. EXTRACT AND CREATE MAIN CKAN DB ---
        log "Parsing CKAN_URL..."
        # Capture python output directly, fail if the python script throws an error
        ckan_details=$(python3 /etc/config/get_details.py "${CKAN_URL}") || fail "Failed to parse CKAN_SQLALCHEMY_URL."
        ckan_database=($ckan_details)
        
        export CKAN_DB=${ckan_database[0]}
        export CKAN_DB_USERNAME=${ckan_database[1]}
        export CKAN_DB_PASSWORD=${ckan_database[2]}
        
        create_ckan_db "${POSTGRES_HOST}" "${POSTGRES_USER:-postgres}" "${CKAN_DB_USERNAME}" "${CKAN_DB_PASSWORD}" "${CKAN_DB}"

        # --- 2. EXTRACT AND CREATE DATASTORE DB & USERS ---
        log "Parsing DATASTORE_WRITE_URL..."
        ds_write_details=$(python3 /etc/config/get_details.py "${DATASTORE_WRITE_URL}") || fail "Failed to parse CKAN__DATASTORE__WRITE_URL."
        datastore_write=($ds_write_details)

        export DS_DB=${datastore_write[0]}
        export DS_RW_USER=${datastore_write[1]}
        export DS_RW_PASS=${datastore_write[2]}

        log "Parsing DATASTORE_READ_URL..."
        ds_read_details=$(python3 /etc/config/get_details.py "${DATASTORE_READ_URL}") || fail "Failed to parse CKAN__DATASTORE__READ_URL."
        datastore_read=($ds_read_details)

        export DS_RO_USER=${datastore_read[1]}
        export DS_RO_PASS=${datastore_read[2]}
        
        create_datastore_db "${POSTGRES_HOST}" "${POSTGRES_USER:-postgres}" "${CKAN_DB_USERNAME}" \
                                "${DS_RW_USER}" "${DS_RW_PASS}" \
                                "${DS_RO_USER}" "${DS_RO_PASS}" \
                                "${DS_DB}"

        log "All Databases Initialized Successfully!"
    }

    # Run the Init Function
    init