{{- if and .Values.frontend.enable .Values.frontend.config }}
# Guardrail: Prevent plain-text secrets
{{- range $key, $value := .Values.frontend.config }}
  {{- if or (regexMatch "(?i)postgres(ql)?://" (toString $value)) (regexMatch "(?i)redis://" (toString $value)) (regexMatch "(?i)secret" $key) }}
    {{- fail (printf "\n\n[SECURITY ERROR]: Detected sensitive data in '.Values.frontend.config.%s'. Move this to '.Values.frontend.env' as an encrypted string!\n" $key) }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.general.projectId }}-frontend-env-config"
data:
  {{- with .Values.frontend.config }}
  {{ toYaml . | nindent 2 }}
  {{- end }}
{{- end }}